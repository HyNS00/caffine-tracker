spring:
  datasource:
    url: jdbc:h2:mem:cafit;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
